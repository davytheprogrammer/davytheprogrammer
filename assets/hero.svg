<svg viewBox="0 0 1200 420" xmlns="http://www.w3.org/2000/svg" font-family="Consolas, 'Courier New', monospace">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#101a33"/>
      <stop offset="45%" stop-color="#070912"/>
      <stop offset="100%" stop-color="#020204"/>
    </radialGradient>
    <linearGradient id="cubeTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00f7ff" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#00f7ff" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="cubeLeft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7b2fff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7b2fff" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="cubeRight" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff2e9a" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ff2e9a" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="barSweep" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="frame">
      <rect x="0" y="0" width="1200" height="420" rx="18"/>
    </clipPath>

    <style>
      <![CDATA[
        .star { animation: twinkle 3.4s ease-in-out infinite; }
        @keyframes twinkle {
          0%, 100% { opacity: .15; }
          50% { opacity: 1; }
        }
        .grid-line { animation: gridScroll 6s linear infinite; }
        @keyframes gridScroll {
          0% { transform: translateY(0); }
          100% { transform: translateY(28px); }
        }
        .hologram { animation: spin 14s linear infinite; transform-origin: 245px 210px; }
        @keyframes spin {
          0% { transform: rotate(0deg) scale(1); }
          50% { transform: rotate(180deg) scale(1.05); }
          100% { transform: rotate(360deg) scale(1); }
        }
        .ring { transform-origin: 245px 210px; animation: pulse 3.6s ease-in-out infinite; }
        .ring2 { animation-delay: -1.2s; }
        .ring3 { animation-delay: -2.4s; }
        @keyframes pulse {
          0% { transform: scale(0.55); opacity: 0; }
          60% { opacity: .55; }
          100% { transform: scale(1.4); opacity: 0; }
        }
        .glitch-cyan { animation: glitchCyan 5s infinite; }
        .glitch-pink { animation: glitchPink 5s infinite; }
        @keyframes glitchCyan {
          0%, 92%, 100% { transform: translate(0,0); opacity: 0; }
          93% { transform: translate(-3px,1px); opacity: .8; }
          95% { transform: translate(2px,-1px); opacity: .5; }
          97% { transform: translate(-1px,0); opacity: 0; }
        }
        @keyframes glitchPink {
          0%, 90%, 100% { transform: translate(0,0); opacity: 0; }
          91% { transform: translate(3px,-1px); opacity: .7; }
          94% { transform: translate(-2px,1px); opacity: .45; }
          96% { transform: translate(1px,0); opacity: 0; }
        }
        .sweep { animation: sweepMove 3.2s ease-in-out infinite; }
        @keyframes sweepMove {
          0% { transform: translateX(-420px); }
          100% { transform: translateX(420px); }
        }
        .scan { animation: scanMove 5s linear infinite; }
        @keyframes scanMove {
          0% { transform: translateY(-420px); }
          100% { transform: translateY(420px); }
        }
        .cursor { animation: blink 1.1s steps(1) infinite; }
        @keyframes blink { 50% { opacity: 0; } }
        .bracket { animation: bracketPulse 3s ease-in-out infinite; }
        @keyframes bracketPulse {
          0%, 100% { opacity: .35; }
          50% { opacity: .9; }
        }
      ]]>
    </style>
  </defs>

  <g clip-path="url(#frame)">
    <rect width="1200" height="420" fill="url(#bgGlow)"/>

    <!-- starfield -->
    <g fill="#bfe9ff">
      <circle class="star" cx="60" cy="40" r="1.4" style="animation-delay:.2s"/>
      <circle class="star" cx="140" cy="90" r="1" style="animation-delay:1.1s"/>
      <circle class="star" cx="230" cy="30" r="1.6" style="animation-delay:.6s"/>
      <circle class="star" cx="330" cy="70" r="1" style="animation-delay:1.8s"/>
      <circle class="star" cx="410" cy="25" r="1.3" style="animation-delay:.9s"/>
      <circle class="star" cx="520" cy="55" r="1" style="animation-delay:2.1s"/>
      <circle class="star" cx="640" cy="35" r="1.5" style="animation-delay:.3s"/>
      <circle class="star" cx="760" cy="80" r="1" style="animation-delay:1.4s"/>
      <circle class="star" cx="880" cy="45" r="1.6" style="animation-delay:.7s"/>
      <circle class="star" cx="960" cy="95" r="1" style="animation-delay:2.4s"/>
      <circle class="star" cx="1040" cy="30" r="1.3" style="animation-delay:1.6s"/>
      <circle class="star" cx="1120" cy="70" r="1" style="animation-delay:.5s"/>
      <circle class="star" cx="1160" cy="20" r="1.4" style="animation-delay:2.8s"/>
      <circle class="star" cx="90" cy="150" r="1" style="animation-delay:1.9s"/>
      <circle class="star" cx="1100" cy="160" r="1.2" style="animation-delay:.4s"/>
      <circle class="star" cx="1050" cy="200" r="1" style="animation-delay:2.6s"/>
      <circle class="star" cx="70" cy="220" r="1.1" style="animation-delay:1.3s"/>
    </g>

    <!-- perspective floor grid -->
    <g stroke="#00f7ff" stroke-opacity="0.16" clip-path="url(#frame)">
      <g class="grid-line">
        <line x1="0" y1="336" x2="1200" y2="336"/>
        <line x1="0" y1="364" x2="1200" y2="364"/>
        <line x1="0" y1="392" x2="1200" y2="392"/>
        <line x1="0" y1="420" x2="1200" y2="420"/>
        <line x1="0" y1="448" x2="1200" y2="448"/>
      </g>
      <line x1="600" y1="300" x2="60" y2="420" stroke-opacity="0.12"/>
      <line x1="600" y1="300" x2="260" y2="420" stroke-opacity="0.12"/>
      <line x1="600" y1="300" x2="460" y2="420" stroke-opacity="0.12"/>
      <line x1="600" y1="300" x2="740" y2="420" stroke-opacity="0.12"/>
      <line x1="600" y1="300" x2="940" y2="420" stroke-opacity="0.12"/>
      <line x1="600" y1="300" x2="1140" y2="420" stroke-opacity="0.12"/>
    </g>

    <!-- rotating isometric hologram cube (left side emblem) -->
    <g filter="url(#glow)">
      <circle class="ring" cx="245" cy="210" r="70" fill="none" stroke="#00f7ff" stroke-width="1"/>
      <circle class="ring ring2" cx="245" cy="210" r="70" fill="none" stroke="#7b2fff" stroke-width="1"/>
      <circle class="ring ring3" cx="245" cy="210" r="70" fill="none" stroke="#ff2e9a" stroke-width="1"/>

      <g class="hologram">
        <polygon points="245,150 300,180 245,210 190,180" fill="url(#cubeTop)" stroke="#00f7ff" stroke-width="1.2"/>
        <polygon points="190,180 245,210 245,270 190,240" fill="url(#cubeLeft)" stroke="#7b2fff" stroke-width="1.2"/>
        <polygon points="300,180 245,210 245,270 300,240" fill="url(#cubeRight)" stroke="#ff2e9a" stroke-width="1.2"/>
        <line x1="245" y1="150" x2="245" y2="210" stroke="#ffffff" stroke-opacity="0.5" stroke-width="0.8"/>
        <line x1="190" y1="180" x2="245" y2="210" stroke="#ffffff" stroke-opacity="0.35" stroke-width="0.8"/>
        <line x1="300" y1="180" x2="245" y2="210" stroke="#ffffff" stroke-opacity="0.35" stroke-width="0.8"/>
      </g>
    </g>

    <!-- HUD name block -->
    <g transform="translate(430,150)">
      <g filter="url(#glow)">
        <text x="0" y="0" font-size="54" font-weight="800" letter-spacing="4" fill="#eafcff">DAVIS OGEGA</text>
      </g>
      <text class="glitch-cyan" x="0" y="0" font-size="54" font-weight="800" letter-spacing="4" fill="#00f7ff">DAVIS OGEGA</text>
      <text class="glitch-pink" x="0" y="0" font-size="54" font-weight="800" letter-spacing="4" fill="#ff2e9a">DAVIS OGEGA</text>

      <text x="3" y="42" font-size="18" letter-spacing="3" fill="#00ff88" filter="url(#softGlow)">NEXT-GEN CODE ARCHITECT</text>
      <text x="3" y="70" font-size="14" letter-spacing="2" fill="#7fd9ff" opacity="0.85">AI-augmented builder :: shipping systems from idea to edge</text>

      <g transform="translate(3,96)" font-size="13" fill="#8be9ff" opacity="0.9">
        <text x="0" y="0">root@davis:~$ deploy --target=production</text>
        <rect class="cursor" x="322" y="-11" width="9" height="15" fill="#00f7ff"/>
      </g>
    </g>

    <!-- sweeping light -->
    <rect class="sweep" x="0" y="0" width="120" height="420" fill="url(#barSweep)" opacity="0.05"/>

    <!-- scanlines -->
    <g class="scan" opacity="0.08">
      <rect x="0" y="0" width="1200" height="1" fill="#00f7ff"/>
      <rect x="0" y="6" width="1200" height="1" fill="#00f7ff"/>
      <rect x="0" y="12" width="1200" height="1" fill="#00f7ff"/>
      <rect x="0" y="18" width="1200" height="1" fill="#00f7ff"/>
    </g>

    <!-- corner brackets -->
    <g class="bracket" stroke="#00f7ff" stroke-width="2" fill="none">
      <path d="M20,20 L20,50 M20,20 L50,20"/>
      <path d="M1180,20 L1180,50 M1180,20 L1150,20"/>
      <path d="M20,400 L20,370 M20,400 L50,400"/>
      <path d="M1180,400 L1180,370 M1180,400 L1150,400"/>
    </g>
  </g>
</svg>
