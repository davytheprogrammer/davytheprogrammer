      .dot { animation: pulseIdle 3.4s ease-in-out infinite; }
      @keyframes pulseIdle { 0%,100% { opacity: .9; } 50% { opacity: .45; } }
    ]]></style>
  </defs>
  <rect width="1160" height="342" rx="14" fill="#05070d" stroke="#161e2e"/>
  
