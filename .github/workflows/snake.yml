name: Generate contribution snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate snake animation
        uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake.svg
            dist/snake-dark.svg?palette=github-dark&color_snake=%2300f7ff
            dist/snake.gif?color_snake=%2300f7ff&color_dots=%23161b22,%230e4429,%23006d32,%2326a641,%2339d353

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fix dist/ ownership
        run: sudo chown -R "$(id -u):$(id -g)" dist

      - name: Generate live stats panel
        run: node .github/scripts/generate-stats.mjs
        env:
          STATS_LOGIN: ${{ github.repository_owner }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push generated assets to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
